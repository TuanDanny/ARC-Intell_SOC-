<svg width="1160" height="680" viewBox="0 0 1160 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="INTELLI-SAFE SoC top-level block diagram">
  <defs>
    <marker id="mBlk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333333"/>
    </marker>
    <marker id="mGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D2A017"/>
    </marker>
    <marker id="mRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E23B3B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="680" fill="#FFFFFF"/>

  <!-- ================= SoC boundary ================= -->
  <rect x="222" y="28" width="790" height="600" rx="14" fill="#FBF3D5" stroke="#D8C285" stroke-width="2"/>

  <!-- ================= Left external pins ================= -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7A2E12">
    <rect x="170" y="68"  width="80" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="210" y="86"  text-anchor="middle">Pin_VDD</text>
    <rect x="170" y="100" width="80" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="210" y="118" text-anchor="middle">Pin_GND</text>
    <rect x="170" y="138" width="80" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="210" y="156" text-anchor="middle">Pin_RST</text>
    <rect x="170" y="170" width="80" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="210" y="188" text-anchor="middle">Pin_XTAL</text>
  </g>
  <g stroke="#333333" stroke-width="1.6" fill="none">
    <line x1="250" y1="81"  x2="290" y2="110"/>
    <line x1="250" y1="113" x2="290" y2="140"/>
    <line x1="250" y1="151" x2="290" y2="172"/>
    <line x1="250" y1="183" x2="290" y2="200"/>
  </g>

  <!-- ================= Infrastructure (gray) ================= -->
  <rect x="278" y="58" width="180" height="178" rx="6" fill="#D6D6D6" stroke="#9A9A9A" stroke-width="1.5"/>
  <rect x="290" y="90" width="68" height="130" rx="4" fill="#C0C0C0" stroke="#7E7E7E" stroke-width="1.3"/>
  <text x="324" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#222222">PMU</text>
  <rect x="372" y="90" width="74" height="130" rx="4" fill="#C0C0C0" stroke="#7E7E7E" stroke-width="1.3"/>
  <text x="409" y="150" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#222222">Clock &amp;</text>
  <text x="409" y="169" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#222222">Reset</text>

  <!-- ================= CCS ================= -->
  <rect x="482" y="52" width="276" height="184" rx="6" fill="#FCE9C0" stroke="#E0B24E" stroke-width="1.5"/>
  <text x="620" y="72" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#333333">CCS</text>
  <rect x="496" y="82" width="112" height="140" rx="5" fill="#F0975A" stroke="#C56E2E" stroke-width="1.4"/>
  <text x="552" y="146" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#3A1500">8-bit RISC</text>
  <text x="552" y="166" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#3A1500">Core</text>
  <rect x="650" y="84" width="66" height="54" rx="5" fill="#F4B67C" stroke="#C6883C" stroke-width="1.4"/>
  <text x="683" y="106" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#3A1500">Data</text>
  <text x="683" y="122" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#3A1500">RAM</text>
  <rect x="650" y="162" width="66" height="54" rx="5" fill="#F4B67C" stroke="#C6883C" stroke-width="1.4"/>
  <text x="683" y="194" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#3A1500">ROM</text>
  <g stroke="#333333" stroke-width="1.8" fill="none">
    <line x1="608" y1="111" x2="650" y2="111" marker-start="url(#mBlk)" marker-end="url(#mBlk)"/>
    <line x1="608" y1="189" x2="650" y2="189" marker-start="url(#mBlk)" marker-end="url(#mBlk)"/>
  </g>

  <!-- ================= AMBA APB Bus (horizontal) ================= -->
  <polygon points="228,300 252,282 780,282 804,300 780,318 252,318" fill="#F5CB5C" stroke="#D2A017" stroke-width="1.5"/>
  <text x="516" y="306" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#4A3600">AMBA APB Bus</text>

  <!-- vertical connectors to horizontal bus -->
  <g stroke="#D2A017" stroke-width="7" fill="none">
    <line x1="368" y1="238" x2="368" y2="280" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="620" y1="238" x2="620" y2="280" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="366" y1="320" x2="366" y2="356" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="620" y1="320" x2="620" y2="363" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
  </g>

  <!-- ================= Right vertical APB bus ================= -->
  <polygon points="807,50 825,74 825,576 807,600 789,576 789,74" fill="#F5CB5C" stroke="#D2A017" stroke-width="1.5"/>
  <g stroke="#D2A017" stroke-width="7" fill="none">
    <line x1="827" y1="107" x2="870" y2="107" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="827" y1="198" x2="870" y2="198" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="827" y1="303" x2="870" y2="303" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="827" y1="403" x2="870" y2="403" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
    <line x1="827" y1="503" x2="870" y2="503" marker-start="url(#mGold)" marker-end="url(#mGold)"/>
  </g>

  <!-- ================= SPIF cluster ================= -->
  <rect x="848" y="40" width="138" height="555" rx="8" fill="#F8D5D5" stroke="#E09A9A" stroke-width="1.5"/>
  <text x="917" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#333333">SPIF</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0F3D30">
    <rect x="872" y="74"  width="90" height="66" rx="6" fill="#B6E9D5" stroke="#6EBE9F" stroke-width="1.4"/><text x="917" y="103" text-anchor="middle">UART</text><text x="917" y="121" text-anchor="middle">Interface</text>
    <rect x="872" y="165" width="90" height="66" rx="6" fill="#B6E9D5" stroke="#6EBE9F" stroke-width="1.4"/><text x="917" y="194" text-anchor="middle">GPIO</text><text x="917" y="212" text-anchor="middle">Controller</text>
    <rect x="872" y="270" width="90" height="66" rx="6" fill="#B6E9D5" stroke="#6EBE9F" stroke-width="1.4"/><text x="917" y="299" text-anchor="middle">Watchdog</text><text x="917" y="317" text-anchor="middle">Timer</text>
    <rect x="872" y="370" width="90" height="66" rx="6" fill="#B6E9D5" stroke="#6EBE9F" stroke-width="1.4"/><text x="917" y="399" text-anchor="middle">BIST</text><text x="917" y="417" text-anchor="middle">Controller</text>
    <rect x="872" y="470" width="90" height="66" rx="6" fill="#B6E9D5" stroke="#6EBE9F" stroke-width="1.4"/><text x="917" y="499" text-anchor="middle">Interrupt</text><text x="917" y="517" text-anchor="middle">Controller</text>
  </g>

  <!-- ================= Right external pins ================= -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#7A2E12">
    <rect x="1015" y="88"  width="66" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="1048" y="106" text-anchor="middle">Pin_RX</text>
    <rect x="1015" y="124" width="66" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="1048" y="142" text-anchor="middle">Pin_TX</text>
    <rect x="1010" y="186" width="94" height="26" rx="4" fill="#F5C48A" stroke="#C6883C"/><text x="1057" y="204" text-anchor="middle" font-size="12">Pin_Relay/Led</text>
  </g>
  <g stroke="#333333" stroke-width="1.6" fill="none">
    <line x1="962" y1="100" x2="1015" y2="101" marker-end="url(#mBlk)"/>
    <line x1="962" y1="120" x2="1015" y2="137" marker-end="url(#mBlk)"/>
    <line x1="962" y1="198" x2="1010" y2="199" marker-end="url(#mBlk)"/>
  </g>

  <!-- ================= External ADC Board ================= -->
  <rect x="58" y="388" width="104" height="104" rx="8" fill="#F4D7F4" stroke="#C588C5" stroke-width="1.5"/>
  <text x="110" y="434" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#4A1F4A">External ADC</text>
  <text x="110" y="452" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#4A1F4A">Board</text>
  <line x1="108" y1="318" x2="108" y2="388" stroke="#555555" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#mBlk)"/>
  <text x="120" y="352" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-style="italic" fill="#555555">Analog Input</text>

  <!-- ================= SPI ================= -->
  <rect x="300" y="358" width="132" height="170" rx="8" fill="#F6D8F6" stroke="#D486D4" stroke-width="1.5"/>
  <text x="366" y="376" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#333333">SPI</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="700" fill="#4A0F4A">
    <rect x="310" y="384" width="112" height="42" rx="5" fill="#EE7EEE" stroke="#C24BC2" stroke-width="1.3"/><text x="366" y="409" text-anchor="middle">SPI Master/Slave</text>
    <rect x="310" y="434" width="112" height="42" rx="5" fill="#EE7EEE" stroke="#C24BC2" stroke-width="1.3"/><text x="366" y="459" text-anchor="middle">FIFO Buffer</text>
    <rect x="310" y="484" width="112" height="42" rx="5" fill="#EE7EEE" stroke="#C24BC2" stroke-width="1.3"/><text x="366" y="509" text-anchor="middle">Data Valid logic</text>
  </g>

  <!-- ADC <-> SPI signals -->
  <g stroke="#333333" stroke-width="1.6" fill="none">
    <line x1="162" y1="398" x2="300" y2="398" marker-end="url(#mBlk)"/>
    <line x1="300" y1="420" x2="162" y2="420" marker-end="url(#mBlk)"/>
    <line x1="300" y1="445" x2="162" y2="445" marker-end="url(#mBlk)"/>
    <line x1="300" y1="468" x2="162" y2="468" marker-end="url(#mBlk)"/>
  </g>
  <g font-family="Consolas, monospace" font-size="11" fill="#333333">
    <text x="205" y="393" text-anchor="middle">MISO</text>
    <text x="205" y="415" text-anchor="middle">MOSI</text>
    <text x="205" y="440" text-anchor="middle">SCLK</text>
    <text x="205" y="463" text-anchor="middle">CS</text>
  </g>

  <!-- ================= DSP ================= -->
  <rect x="462" y="365" width="326" height="145" rx="8" fill="#DEF3DE" stroke="#78BD78" stroke-width="1.5"/>
  <text x="620" y="383" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#333333">DSP</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#123512">
    <rect x="498" y="398" width="86" height="98" rx="5" fill="#7ECB7E" stroke="#4E9E4E" stroke-width="1.3"/><text x="541" y="443" text-anchor="middle">Differential</text><text x="541" y="461" text-anchor="middle">Filter</text>
    <rect x="598" y="398" width="90" height="98" rx="5" fill="#7ECB7E" stroke="#4E9E4E" stroke-width="1.3"/><text x="643" y="443" text-anchor="middle">Threshold</text><text x="643" y="461" text-anchor="middle">Comparator</text>
    <rect x="702" y="398" width="76" height="98" rx="5" fill="#7ECB7E" stroke="#4E9E4E" stroke-width="1.3"/><text x="740" y="443" text-anchor="middle">Leaky</text><text x="740" y="461" text-anchor="middle">Integrator</text>
  </g>
  <g stroke="#333333" stroke-width="1.8" fill="none">
    <line x1="584" y1="447" x2="598" y2="447" marker-end="url(#mBlk)"/>
    <line x1="688" y1="447" x2="702" y2="447" marker-end="url(#mBlk)"/>
  </g>

  <!-- SPI -> DSP sample stream (gold) -->
  <line x1="432" y1="447" x2="498" y2="447" stroke="#D2A017" stroke-width="7" fill="none" marker-end="url(#mGold)"/>

  <!-- ================= Interrupt Request (red) ================= -->
  <path d="M740,510 L740,565 L917,565 L917,538" fill="none" stroke="#E23B3B" stroke-width="2" marker-end="url(#mRed)"/>
  <text x="842" y="585" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E23B3B">Interrupt</text>
  <text x="842" y="601" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#E23B3B">Request</text>

  <!-- ================= Title ================= -->
  <text x="560" y="608" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800" fill="#1A1A1A">INTELLI-SAFE SoC</text>
</svg>
